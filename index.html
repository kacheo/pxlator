<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pxlator — Image to Pixel Art</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>pxlator</h1>
  </header>

  <div id="app-layout">
    <aside id="sidebar">
      <section class="sb-section" id="sec-image">
        <h2>Image</h2>
        <div id="drop-zone">
          <span>Click or drag image here</span>
          <input type="file" id="file-input" accept="image/*" />
        </div>
        <div id="error" class="hidden" role="alert"></div>
      </section>

      <section class="sb-section hidden" id="sec-palette">
        <h2>Palette</h2>
        <select id="palette">
          <option value="auto">Auto (from image)</option>
          <optgroup label="Retro">
            <option value="gameboy">Game Boy</option>
            <option value="nes">NES</option>
            <option value="pico8">PICO-8</option>
            <option value="c64">C64</option>
            <option value="cga">CGA</option>
            <option value="msx">MSX</option>
          </optgroup>
          <optgroup label="Vibes">
            <option value="psychedelic">Psychedelic</option>
            <option value="synthwave">Synthwave</option>
            <option value="neoncity">Neon City</option>
            <option value="candy">Candy</option>
            <option value="lava">Lava</option>
          </optgroup>
        </select>
        <label id="colors-label">Colors <input type="range" id="colors" min="2" max="256" value="16" /><span id="col-val">16</span></label>
        <div id="palette-swatches"></div>
      </section>

      <section class="sb-section hidden" id="sec-dither">
        <h2>Dither</h2>
        <select id="dither">
          <option value="none">None</option>
          <option value="floyd-steinberg">Floyd-Steinberg</option>
          <option value="atkinson">Atkinson</option>
          <option value="ordered">Ordered 4x4</option>
        </select>
      </section>

      <section class="sb-section hidden" id="sec-resolution">
        <h2>Resolution</h2>
        <div id="res-presets">
          <button data-res="16">16</button>
          <button data-res="32">32</button>
          <button data-res="64">64</button>
          <button data-res="128">128</button>
          <button data-res="256">256</button>
        </div>
        <label>Width <input type="range" id="resolution" min="8" max="256" value="64" /><span id="res-val">64</span>px</label>
      </section>

      <section class="sb-section hidden" id="sec-export">
        <h2>Export</h2>
        <label>View
          <select id="view-mode">
            <option value="compare">Compare</option>
            <option value="side-by-side">Side by Side</option>
          </select>
        </label>
        <div class="download-group">
          <select id="download-size">
            <option value="1">Small (true size)</option>
            <option value="4">Medium (4×)</option>
            <option value="16" selected>Large (16×)</option>
          </select>
          <button id="download">Download</button>
          <button id="copy-btn">Copy</button>
        </div>
        <div id="toast"></div>
      </section>
    </aside>

    <section id="canvas-area">
      <p id="drop-hint">Drop an image or paste from clipboard</p>
      <div id="spinner" class="hidden">
        <div class="spinner-ring"></div>
        <p>Processing…</p>
      </div>
      <div id="canvas-wrap" class="hidden">
        <div id="compare-container">
          <div class="compare-pane" id="pane-original">
            <h3>Original</h3>
            <canvas id="original"></canvas>
          </div>
          <div class="compare-pane" id="pane-output">
            <h3>Pixelated</h3>
            <canvas id="output"></canvas>
          </div>
          <div id="compare-handle"><div id="compare-knob"></div></div>
          <span class="compare-label compare-label-left">Original</span>
          <span class="compare-label compare-label-right">Pixelated</span>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
