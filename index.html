<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pxlator — Image to Pixel Art</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>pxlator</h1>
    <p>Drop an image to pixelate it</p>
  </header>

  <main>
    <div id="drop-zone">
      <span>Click or drag image here</span>
      <input type="file" id="file-input" accept="image/*" />
    </div>

    <div id="error" class="hidden" role="alert"></div>

    <div id="controls" class="hidden">
      <label>Resolution <input type="range" id="resolution" min="8" max="256" value="64" /><span id="res-val">64</span>px</label>
      <label>Colors <input type="range" id="colors" min="2" max="256" value="16" /><span id="col-val">16</span></label>
      <label>Dither
        <select id="dither">
          <option value="none">None</option>
          <option value="floyd-steinberg">Floyd-Steinberg</option>
          <option value="atkinson">Atkinson</option>
          <option value="ordered">Ordered 4x4</option>
        </select>
      </label>
      <label>Palette
        <select id="palette">
          <option value="auto">Auto (from image)</option>
          <option value="gameboy">Game Boy</option>
          <option value="nes">NES</option>
          <option value="pico8">PICO-8</option>
        </select>
      </label>
      <div class="download-group">
        <select id="download-size">
          <option value="1">Small (true size)</option>
          <option value="4">Medium (4×)</option>
          <option value="16" selected>Large (16×)</option>
        </select>
        <button id="download">Download PNG</button>
      </div>
    </div>

    <div id="canvas-wrap" class="hidden">
      <div>
        <h3>Original</h3>
        <canvas id="original"></canvas>
      </div>
      <div>
        <h3>Pixelated</h3>
        <canvas id="output"></canvas>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
